name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/foreman
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: plugins/foreman/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e .
      - run: python scripts/sync_version.py --check
      - run: python -m unittest discover -s tests -v
      - run: python scripts/foreman_mcp.py --self-test
        env:
          FOREMAN_PYTHON: ${{ env.pythonLocation }}/bin/python
